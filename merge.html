<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juntar PDF - PDF++</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <svg viewBox="0 0 64 64" aria-hidden="true" class="brand-mark">
          <rect x="10" y="8" width="30" height="40" rx="8"
                fill="none" stroke="currentColor" stroke-width="4" />
          <path d="M24 20h20c5 0 10 4 10 10v16c0 5-5 10-10 10H24"
                fill="none" stroke="currentColor" stroke-width="4"
                stroke-linecap="round" />
          <path d="M20 22h10M20 30h16M20 38h12"
                fill="none" stroke="currentColor" stroke-width="4"
                stroke-linecap="round" />
        </svg>
        <span>PDF++</span>
      </a>

      <nav class="nav-links" aria-label="Principal">
        <a href="index.html">Início</a>
        <a href="merge.html">Juntar</a>
        <a href="compress.html">Comprimir</a>
        <a href="convert.html">Converter</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Juntar PDF</h1>
      </div>
    </section>

    <section class="container demo-layout">
      <article class="upload-box">
        <span class="badge">Entrada</span>
        <h2>Selecione os PDFs</h2>

        <label class="btn btn-secondary">
          Selecionar arquivos
          <input
            type="file"
            accept="application/pdf"
            multiple
            class="file-input"
            data-tool="merge"
            hidden
          />
        </label>

        <ul class="file-list" data-file-list="merge"></ul>

        <div class="action-row">
          <button class="btn btn-primary" type="button" data-run-demo data-tool="merge">
            Juntar arquivos
          </button>
        </div>
      </article>

      <aside class="result-box">
        <span class="badge">Resultado</span>
        <h2>Status</h2>
        <div class="fake-progress">
          <span data-progress data-tool="merge"></span>
        </div>
        <p class="status" data-status data-tool="merge">
          Nenhum arquivo selecionado.
        </p>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
